<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>POS System - Error</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            max-width: 500px;
            padding: 40px;
            text-align: center;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        h1 { font-size: 48px; margin-bottom: 20px; }
        p { font-size: 18px; line-height: 1.6; margin-bottom: 20px; opacity: 0.9; }
        button {
            background: white;
            color: #764ba2;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            margin: 10px;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        .contact { margin-top: 30px; font-size: 12px; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚠️</h1>
        <h1>Application Error</h1>
        <p>The POS system couldn't start properly.</p>
        <p>Please restart the app. If the problem continues, contact the developer.</p>
        <button onclick="window.location.reload()">Restart App</button>
        <button onclick="window.close()">Close</button>
        <div class="contact">
            POS System · Contact Developer: abbas7t2
        </div>
    </div>
</body>
</html>
